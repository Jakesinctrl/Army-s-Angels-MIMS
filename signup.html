<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Army's Angels Clinic</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register to request an appointment</p>
            </div>
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label>Student ID</label>
                    <input type="text" id="studentID" placeholder="LRD ID" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="newPassword" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-auth">Sign Up</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
                <a href="landingpage.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate account creation
            alert("Account created! You can now access the student portal.");
            window.location.href = "student.html"; // Redirects to student dashboard
        });
    </script>
</body>
</html>

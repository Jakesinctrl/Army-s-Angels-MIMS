<!DOCTYPE html>
<html lang="en">
<head>

        <link rel="stylesheet" href="auth-style.css">

    <link rel="stylesheet" href="landingpage.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #004d1a; border-radius: 10px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Clinic Login</h2>
        <input type="text" id="username" placeholder="Username (Admin)">
        <input type="password" id="password" placeholder="Password (12345678)">
        <button onclick="handleLogin()" class="btn btn-primary">Login</button>
        <p id="error" style="color:red; display:none;">Invalid Credentials!</p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
